<!DOCTYPE html>
<html>
  <head>
    <title class="title">cpabra</title>
    <link rel="icon" href="favicon2.ico">
    <style>
      #image
      {
        display:block;
        margin-left:auto;
        margin-right:auto;
      }
      button
      {
        display:block;
        margin-left:auto;
        margin-right:auto; 
      }
    </style>
  </head>
  <body>
    <div>
      <button id="btn" style="cursor:pointer; padding:30px; border:5px; font-size:200%;">CLICK</button>
    </div>
    <div>
      <p id="text" style="text-align:center; font-size:500%;"></p>
      <br><br>
      <p id="key" style="text-align:center;"></p>
     <!-- <img src=null alt="ツ" title="Capybara" id="img"> -->
    </div>
    <div>
      <script>
        let y = 0;
        const btn = document.getElementById("btn");
        btn.addEventListener("click",function(){
          document.getElementById("text").innerHTML="CAPYBARA";
          document.getElementById("btn").remove();
          const img = document.createElement("img");
          img.src="img.webp";
          img.alt="Capybara";
          img.id="image"
          img.title="CapyBara";
          document.body.appendChild(img);
        })
        document.addEventListener("keydown", function(event){
          const img = document.getElementById("image");
          if(event.key === "w")
          {
            y+=10;
          }
          if(event.key === "s")
          {
            y-=10;
          }
          img.style.transform=`translateY(${y}px)`;
          const key = document.getElementById("key");
          key.innerHTML = `${event.key} was pressed`;
          setTimeout((=>;{
          key.innerHTML = "";
          }, 500);
        })
      </script>
    </div>
  </body>
</html>
