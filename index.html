<!DOCTYPE html>
<html>
  <head>
    <title class="title">cpabra</title>
    <link ref="icon" href="favicon2.ico">
    <style>
      .image
      {
        display:block;
        margin-left:auto;
        margin-right:auto;
      }
    </style>
  </head>
  <body>
    <div>
      <button id="btn" style="cursor:pointer;">CLICK</button>
    </div>
    <div>
      <p id="text" style="text-align:center; font-size:300%;"></p>
      <img src=null alt="ツ" title="Capybara" id="img">
    </div>
    <div>
      <script>
        const bt = document.getElementById("btn");
        btn.addEventListener("click",function(){
          document.getElementById("text").innerHTML="CAPYBARA";
          const img = document.createElement("img");
          img.scr="img.webp";
          img.atl="Capybara";
          img.id="image"
          img.title="CapyBara";
        })
      </script>
    </div>
  </body>
</html>
