<!DOCTYPE html>
<html>
  <head>
    <title class="title">cpabra</title>
    <link rel="icon" href="favicon2.ico">
    <style>
      #image
      {
        display:block;
        margin-left:auto;
        margin-right:auto;
      }
      button
      {
        display:block;
        margin-left:auto;
        margin-right:auto; 
      }
    </style>
  </head>
  <body>
    <div>
      <button id="btn" style="cursor:pointer; padding:30px; border:5px; font-size:1000%;">CLICK</button>
    </div>
    <div>
      <p id="text" style="text-align:center; font-size:500%;"></p>
     <!-- <img src=null alt="ツ" title="Capybara" id="img"> -->
    </div>
    <div>
      <script>
        const btn = document.getElementById("btn");
        btn.addEventListener("click",function(){
          document.getElementById("text").innerHTML="CAPYBARA";
          const img = document.createElement("img");
          img.src="img.webp";
          img.alt="Capybara";
          img.id="image"
          img.title="CapyBara";
          document.body.appendChild(img);
        })
        document.addEventListener("keydown", function(){
          if(event.key === w)
          {
            img.transform=translateY(10px)
          }
          if(event.key === s)
          {
            img.transform=translateY(-10px)
          }
        })
      </script>
    </div>
  </body>
</html>
